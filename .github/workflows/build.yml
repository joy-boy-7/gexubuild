name: Build & Install Jayanth's Gexu
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Future-proofing for the June deadline

jobs:
  build:
    name: Build Gexu Debug APK
    runs-on: 'ubuntu-latest'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true  # Bypassing the broken GitHub cache service

      - name: Build Standard Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleStandardDebug --no-daemon --stacktrace

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Gexu-Jay-Debug-Build
          path: app/build/outputs/apk/standard/debug/*.apk
