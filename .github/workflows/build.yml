name: Build Unsigned Release Gexu
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: false  # Prevents GitHub from killing the build over minor code warnings

jobs:
  build:
    name: Build Unsigned Release APK
    runs-on: 'ubuntu-latest'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Build Unsigned Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -Pinclude-telemetry -Penable-updater --no-daemon --stacktrace

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Gexu-Unsigned-Release-Build
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
