name: Build Unsigned Release Gexu
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: false

jobs:
  build:
    name: Build Unsigned Release APK
    runs-on: 'ubuntu-latest'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Inject Dummy Google Services (Fork Bypass)
        run: |
          cat << 'EOF' > app/google-services.json
          {
            "project_info": { "project_number": "1234567890", "project_id": "dummy-project" },
            "client": [ {
              "client_info": { "mobilesdk_app_id": "1:1234567890:android:abcdef", "android_client_info": { "package_name": "com.ramsesbr.gexu" } },
              "oauth_client": [],
              "api_key": [ { "current_key": "dummy-api-key" } ],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            } ],
            "configuration_version": "1"
          }
          EOF

      - name: Build Unsigned Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -Penable-updater --no-daemon --stacktrace

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Gexu-Unsigned-Release-Build
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
